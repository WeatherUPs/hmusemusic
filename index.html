<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HMuse — First Iteration</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0c0c0f; color: white; font-family: sans-serif; padding: 50px; text-align: center; }
        .card { background: #13131a; padding: 20px; border-radius: 10px; border: 1px solid #2a2a3a; display: inline-block; }
        input { display: block; width: 100%; margin: 10px 0; padding: 10px; background: #1a1a24; border: 1px solid #2a2a3a; color: white; border-radius: 5px; }
        button { background: #7c5cfc; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>HMuse</h1>
    
    <div id="auth-section">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">Login</button>
        <button onclick="signup()">Signup</button>
    </div>

    <div id="upload-section" class="hidden">
        <div class="card">
            <h3>Upload Track</h3>
            <input type="file" id="audio-file" accept="audio/mpeg">
            <input type="text" id="title" placeholder="Track Title">
            <button id="up-btn" onclick="upload()">Submit Track</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://veuvkutbzhbwwlkoxwaz.supabase.co';
        const SB_KEY = 'sb_publishable_oKnlJ85a4RJyMdQbuknhQg_Ha6Au53F';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let user = null;

        async function signup() {
            const { error } = await sb.auth.signUp({
                email: document.getElementById('email').value,
                password: document.getElementById('pass').value
            });
            if (error) alert(error.message); else alert("Check email!");
        }

        async function login() {
            const { data, error } = await sb.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('pass').value
            });
            if (error) alert(error.message);
            else {
                user = data.user;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('upload-section').classList.remove('hidden');
            }
        }

        async function upload() {
            const file = document.getElementById('audio-file').files[0];
            const title = document.getElementById('title').value;
            if(!file || !title) return alert("Fill everything!");

            document.getElementById('up-btn').innerText = "Uploading...";

            try {
                // 1. Upload file to Storage
                const fileName = Date.now() + "_" + file.name;
                const { error: sErr } = await sb.storage.from('music').upload(fileName, file);
                if (sErr) throw sErr;

                // 2. Insert to DB (The SQL 'DEFAULT auth.uid()' handles the user_id for us)
                const { error: dErr } = await sb.from('tracks').insert([{
                    title: title,
                    audio_url: fileName,
                    artist: user.email.split('@')[0],
                    status: 'pending'
                }]);
                if (dErr) throw dErr;

                alert("Success!");
                location.reload();
            } catch (e) {
                alert(e.message);
            }
        }
    </script>
</body>
</html>
