<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMuse — Free Music Sharing</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* Styles remain the same as your original design */
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#0c0c0f;--surface:#13131a;--surface2:#1a1a24;--surface3:#22222f;
            --border:#2a2a3a;--accent:#7c5cfc;--accent2:#a855f7;--accent-dim:#3d2e7a;
            --green:#22c55e;--red:#ef4444;--amber:#f59e0b;
            --text:#f0effe;--muted:#7a7a9a;--muted2:#4a4a6a;
        }
        body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;overflow-x:hidden}
        .hidden{display:none!important}
        #topnav{position:fixed;top:0;left:0;right:0;z-index:500;height:60px;background:rgba(12,12,15,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
        .btn-accent{background:var(--accent);border:none;color:#fff;padding:7px 14px;border-radius:8px;font-weight:600;cursor:pointer}
        .fi{width:100%;background:var(--surface2);border:1px solid var(--border);color:#fff;padding:10px;border-radius:8px;margin-top:5px}
        .mov{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000}
        .modal{background:var(--surface);padding:30px;border-radius:16px;width:100%;max-width:400px;border:1px solid var(--border)}
        #toast{position:fixed;bottom:20px;right:20px;background:var(--accent);padding:12px 20px;border-radius:8px;opacity:0;transition:0.3s;pointer-events:none}
        #toast.show{opacity:1}
        /* ... (Include all other styles from your original code here) ... */
    </style>
</head>
<body onload="init()">

<nav id="topnav">
    <div class="nav-logo">HMuse</div>
    <div id="nav-right">
        <span id="user-display" style="margin-right:10px; font-size:12px; color:var(--muted)"></span>
        <button id="login-btn" class="btn-ghost" onclick="om('m-login')">Log In</button>
        <button id="logout-btn" class="btn-ghost hidden" onclick="doLogout()">Log Out</button>
        <button class="btn-accent" onclick="checkUploadAuth()">+ Upload</button>
    </div>
</nav>

<div id="app" style="padding-top:80px; text-align:center">
    <h1 style="font-family:'Syne'; font-size:48px">Your Music, Shared.</h1>
    <p style="color:var(--muted)">Join the community of independent creators.</p>
</div>

<div class="mov hidden" id="m-login">
    <div class="modal">
        <h2>Login</h2>
        <input class="fi" type="email" id="le" placeholder="Email">
        <input class="fi" type="password" id="lp" placeholder="Password">
        <button class="btn-accent" style="width:100%; margin-top:15px" onclick="doLogin()">Sign In</button>
        <p style="font-size:12px; margin-top:10px; cursor:pointer" onclick="cm('m-login');om('m-signup')">Need an account? Sign up</p>
    </div>
</div>

<div class="mov hidden" id="m-signup">
    <div class="modal">
        <h2>Join HMuse</h2>
        <input class="fi" type="email" id="se" placeholder="Email">
        <input class="fi" type="password" id="sp" placeholder="Password (min 6 chars)">
        <button class="btn-accent" style="width:100%; margin-top:15px" onclick="doSignup()">Create Account</button>
    </div>
</div>

<div class="mov hidden" id="m-upload">
    <div class="modal">
        <h2>Upload Track</h2>
        <div class="fg"><label>Audio File</label><input type="file" id="af" accept="audio/*" class="fi"></div>
        <div class="fg"><label>Title</label><input type="text" id="utitle" class="fi" placeholder="Track Name"></div>
        <div id="uprog" class="hidden" style="color:var(--accent); font-size:12px; margin-top:10px">Uploading...</div>
        <button id="ubtn" class="btn-accent" style="width:100%; margin-top:15px" onclick="doUpload()">Submit Track</button>
        <button class="btn-ghost" style="width:100%; margin-top:10px" onclick="cm('m-upload')">Cancel</button>
    </div>
</div>

<div id="toast">Successfully updated!</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SB_URL = 'https://veuvkutbzhbwwlkoxwaz.supabase.co';
    const SB_KEY = 'sb_publishable_oKnlJ85a4RJyMdQbuknhQg_Ha6Au53F'; // Ensure this is your Project API Key
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let CU = null;

    async function init() {
        const { data: { session } } = await sb.auth.getSession();
        updateUserUI(session?.user || null);
    }

    function updateUserUI(user) {
        CU = user;
        if (user) {
            document.getElementById('login-btn').classList.add('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            document.getElementById('user-display').textContent = user.email;
        } else {
            document.getElementById('login-btn').classList.remove('hidden');
            document.getElementById('logout-btn').classList.add('hidden');
            document.getElementById('user-display').textContent = '';
        }
    }

    async function doLogin() {
        const email = document.getElementById('le').value;
        const password = document.getElementById('lp').value;
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) alert(error.message);
        else {
            updateUserUI(data.user);
            cm('m-login');
        }
    }

    async function doSignup() {
        const email = document.getElementById('se').value;
        const password = document.getElementById('sp').value;
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) alert(error.message);
        else alert("Check your email for confirmation!");
    }

    async function doLogout() {
        await sb.auth.signOut();
        updateUserUI(null);
    }

    function checkUploadAuth() {
        if (!CU) om('m-login');
        else om('m-upload');
    }

    async function doUpload() {
        const file = document.getElementById('af').files[0];
        const title = document.getElementById('utitle').value;
        
        if (!file || !title) return alert("Please fill all fields");

        document.getElementById('ubtn').disabled = true;
        document.getElementById('uprog').classList.remove('hidden');

        try {
            // 1. Upload file to Storage
            const fileName = `${Date.now()}-${file.name}`;
            const { data: uploadData, error: uploadError } = await sb.storage
                .from('music')
                .upload(fileName, file);

            if (uploadError) throw uploadError;

            // 2. Insert into Database
            const { error: dbError } = await sb.from('tracks').insert([{
                title: title,
                audio_url: fileName,
                status: 'pending',
                artist: CU.email.split('@')[0]
            }]);

            if (dbError) throw dbError;

            alert("Upload Success! Admin will review it.");
            cm('m-upload');
        } catch (e) {
            alert(e.message);
        } finally {
            document.getElementById('ubtn').disabled = false;
            document.getElementById('uprog').classList.add('hidden');
        }
    }

    function om(id) { document.getElementById(id).classList.remove('hidden'); }
    function cm(id) { document.getElementById(id).classList.add('hidden'); }
</script>
</body>
</html>
